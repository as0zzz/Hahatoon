<aside class="sidebar">
  <a class="brand" href="{% url 'home' %}">
    {% load static %}
    <span class="brand-mark"><img src="{% static 'img/ttm-znak_gradient.png' %}" alt=""></span>
    <span>
      <strong>Транстелематика</strong>
      <small>управление задачами</small>
    </span>
  </a>
  <nav class="nav">
    <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Главная</a>
    <a href="{% url 'tasks:mine' %}" class="{% if '/tasks/mine' in request.path %}active{% endif %}">Мои задачи</a>
    <a href="{% url 'tasks:list' %}" class="{% if '/tasks/' in request.path and '/tasks/mine' not in request.path %}active{% endif %}">Все задачи</a>
    <a href="{% url 'planning' %}" class="{% if '/planning/' in request.path %}active{% endif %}">Планирование</a>
    <a href="{% url 'kanban' %}" class="{% if '/kanban/' in request.path %}active{% endif %}">Канбан</a>
    <a href="{% url 'calendar' %}" class="{% if '/calendar/' in request.path %}active{% endif %}">Календарь</a>
    <a href="{% url 'dashboards:index' %}" class="{% if '/dashboards/' in request.path %}active{% endif %}">Дашборды</a>
    <a href="{% url 'ai:index' %}" class="{% if '/ai/' in request.path %}active{% endif %}">AI-помощник</a>
    <a href="{% url 'departments:employees' %}" class="{% if '/departments/employees/' in request.path %}active{% endif %}">Сотрудники</a>
    <a href="{% url 'departments:list' %}" class="{% if '/departments/' in request.path and '/employees/' not in request.path %}active{% endif %}">Отделы</a>
    <a href="{% url 'reports:index' %}" class="{% if '/reports/' in request.path %}active{% endif %}">Отчёты</a>
    <a href="{% url 'notifications:list' %}" class="{% if '/notifications/' in request.path %}active{% endif %}">Уведомления</a>
    <a href="{% url 'settings' %}" class="{% if '/settings/' in request.path %}active{% endif %}">Настройки</a>
    <a href="{% url 'audit:list' %}" class="{% if '/audit/' in request.path %}active{% endif %}">Аудит</a>
  </nav>
</aside>
