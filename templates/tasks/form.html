{% extends "base.html" %}
{% block title %}{{ title }} TTM{% endblock %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
<style>
  /* Match TomSelect to .form-control */
  .ts-wrapper.form-control {
    border: none !important;
    padding: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    height: auto !important;
  }
  .ts-control {
    border: 1px solid var(--line) !important;
    border-radius: 10px !important;
    padding: 10px 12px !important;
    background: var(--white) !important;
    min-height: 44px !important;
    box-shadow: none !important;
    transition: border-color .18s ease, box-shadow .18s ease !important;
    font-family: inherit !important;
    font-size: inherit !important;
    color: var(--ink) !important;
    display: flex;
    align-items: center;
  }
  .ts-wrapper.focus .ts-control {
    border-color: var(--digital) !important;
    box-shadow: 0 0 0 3px rgba(38, 154, 230, .18) !important;
  }
  .ts-dropdown {
    border: 1px solid var(--line) !important;
    border-radius: 10px !important;
    box-shadow: 0 16px 42px rgba(2, 15, 82, .08) !important;
    font-family: inherit !important;
    font-size: inherit !important;
    color: var(--ink) !important;
    margin-top: 4px !important;
  }
  .ts-dropdown .option {
    padding: 10px 12px !important;
  }
  .ts-control > input {
    font-family: inherit !important;
    font-size: inherit !important;
    color: var(--ink) !important;
  }

  .task-form-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px 24px;
  }
  .task-form-grid label {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .task-form-grid label span {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
  }
  .field-title, .field-description {
    grid-column: 1 / -1;
  }
  .field-description textarea {
    min-height: 60px;
    height: 60px;
  }
</style>
<section class="panel" style="margin-top: 24px;">
  <div class="panel-head">
    <div>
      <h2>{{ title|default:"Создание задачи" }}</h2>
      <p class="muted">Заполните поля формы. Дополнительные детали можно указать позже.</p>
    </div>
    <div style="display: flex; gap: 12px;">
      <a class="btn btn-ghost" href="{% url 'tasks:list' %}">Отмена</a>
    </div>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="task-form-grid">
      {% for field in form %}
        <label class="{% if field.name == 'description' %}field-description{% elif field.name == 'title' %}field-title{% endif %}">
          <span>{{ field.label }}</span>
          {{ field }}
          {% for error in field.errors %}<small class="error-text" style="color: var(--red);">{{ error }}</small>{% endfor %}
        </label>
      {% endfor %}
    </div>
    <div style="margin-top: 32px; display: flex; justify-content: flex-start; gap: 16px;">
      <button class="btn btn-primary" type="submit" style="min-width: 180px;">Сохранить задачу</button>
      <a class="btn btn-light" href="{% url 'tasks:list' %}">Отмена</a>
    </div>
  </form>
</section>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var tsSettings = {
      create: false,
      sortField: { field: "text", direction: "asc" }
    };
    var deptSelect = new TomSelect('#id_department', tsSettings);
    var teamSelect = new TomSelect('#id_team', tsSettings);
    var respSelect = new TomSelect('#id_responsible', tsSettings);

    var userMapping = {{ user_mapping_json|safe|default:"{}" }};
    
    respSelect.on('change', function(value) {
      if (value && userMapping[value]) {
        var data = userMapping[value];
        if (data.department) {
          deptSelect.setValue(data.department);
        }
        if (data.team) {
          teamSelect.setValue(data.team);
        }
      }
    });
  });
</script>
{% endblock %}
