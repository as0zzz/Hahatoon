{% extends "base.html" %}
{% block title %}{{ title }} TTM{% endblock %}
{% block content %}
<style>
  .task-form-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px 24px;
  }
  .task-form-grid label {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .task-form-grid label span {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
  }
  .field-title, .field-description, .field-watchers {
    grid-column: 1 / -1;
  }
  .field-description textarea {
    min-height: 60px;
    height: 60px;
  }
  .checkbox-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 80px;
    overflow-y: auto;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .checkbox-list label {
    flex-direction: row;
    align-items: center;
    width: auto;
    min-width: 120px;
    padding: 0;
    border: none;
  }
</style>
<section class="panel" style="margin-top: 24px;">
  <div class="panel-head">
    <div>
      <h2>{{ title|default:"Создание задачи" }}</h2>
      <p class="muted">Заполните поля формы. Дополнительные детали можно указать позже.</p>
    </div>
    <div style="display: flex; gap: 12px;">
      <a class="btn btn-ghost" href="{% url 'tasks:list' %}">Отмена</a>
    </div>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="task-form-grid">
      {% for field in form %}
        <label class="{% if field.name == 'description' %}field-description{% elif field.name == 'title' %}field-title{% elif field.name == 'watchers' %}field-watchers{% endif %}">
          <span>{{ field.label }}</span>
          {{ field }}
          {% for error in field.errors %}<small class="error-text" style="color: var(--red);">{{ error }}</small>{% endfor %}
        </label>
      {% endfor %}
    </div>
    <div style="margin-top: 32px; display: flex; justify-content: flex-start; gap: 16px;">
      <button class="btn btn-primary" type="submit" style="min-width: 180px;">Сохранить задачу</button>
      <a class="btn btn-light" href="{% url 'tasks:list' %}">Отмена</a>
    </div>
  </form>
</section>
{% endblock %}
